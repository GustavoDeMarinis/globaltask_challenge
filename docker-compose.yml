services:
  postgres:
    image: postgres:16
    container_name: globaltask_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-globaltask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-globaltask}
      POSTGRES_DB: ${POSTGRES_DB:-globaltask_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-globaltask} -d $${POSTGRES_DB:-globaltask_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: globaltask_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://${POSTGRES_USER:-globaltask}:${POSTGRES_PASSWORD:-globaltask}@postgres/${POSTGRES_DB:-globaltask_dev}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: localhost
    ports:
      - "4000:4000"

volumes:
  pg_data: